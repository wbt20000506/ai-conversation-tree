<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 接口设置</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="popup">
    <header class="popup-header">
      <h1>AI 接口设置</h1>
      <p>已支持 OpenAI、Gemini、Claude、DeepSeek、MiMo 和自定义 OpenAI 兼容端点。未设置 API Key 时会自动使用硬算法。</p>
    </header>

    <label class="field">
      <span>API 类型</span>
      <select id="api-type">
        <option value="openai">OpenAI</option>
        <option value="gemini">Gemini</option>
        <option value="claude">Claude</option>
        <option value="deepseek">DeepSeek</option>
        <option value="mimo">MiMo</option>
        <option value="custom">自定义兼容端点</option>
      </select>
    </label>

    <label class="field">
      <span id="model-label">模型</span>
      <input id="model-input" type="text" autocomplete="off" spellcheck="false" placeholder="请输入模型名，留空则自动选择" />
    </label>

    <label class="field">
      <span id="api-key-label">API Key</span>
      <div class="input-with-action">
        <input id="api-key" type="password" autocomplete="off" spellcheck="false" placeholder="请输入 API Key" />
        <button id="toggle-api-key" type="button" class="icon-button" aria-label="显示 API Key" title="显示 API Key">
          <svg class="eye-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
            <path class="eye-outline" d="M2.6 12c2.2-3.6 5.4-5.4 9.4-5.4s7.2 1.8 9.4 5.4c-2.2 3.6-5.4 5.4-9.4 5.4S4.8 15.6 2.6 12Z" />
            <circle class="eye-pupil" cx="12" cy="12" r="2.3" />
            <path class="eye-strike" d="M4.5 19.2 19.5 4.8" />
          </svg>
        </button>
      </div>
    </label>

    <label id="custom-endpoint-field" class="field hidden">
      <span>自定义端点</span>
      <input id="custom-endpoint" type="url" autocomplete="off" spellcheck="false" placeholder="例如：https://example.com/v1/chat/completions" />
    </label>

    <p id="hint" class="hint">当前选择的接口将优先参与语义分析；没有可用 Key 时自动回退到硬算法。</p>

    <div class="actions">
      <button id="save" type="button">保存</button>
      <button id="clear" type="button" class="secondary">清空</button>
    </div>

    <p id="status" class="status" aria-live="polite">未读取设置</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
